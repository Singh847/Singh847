### 4. Enable Workflow Permissions

This is the step most people miss ⚠️

1. Go to your `Singh847` repo
2. Click **Settings** tab
3. Left sidebar → **Actions** → **General**
4. Scroll down to **"Workflow permissions"**
5. Select ✅ **"Read and write permissions"**
6. Click **Save**

---

### 5. Run it manually the first time

1. Click the **Actions** tab in your repo
2. You'll see **"Generate Snake"** in the left list
3. Click it → click **"Run workflow"** button → **Run workflow**
4. Wait ~1 minute for the green tick ✅

---

### 6. Verify it worked

After it runs, go to:
```
github.com/Singh847/Singh847/tree/output
